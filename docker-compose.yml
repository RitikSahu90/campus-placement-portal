version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: placement_portal
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically run these scripts on first startup
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/src/database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=placement_portal
      - JWT_SECRET=super_secret_key_change_me_in_production
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
